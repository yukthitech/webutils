# WebUtils testapp — widget harness

spring.main.allow-circular-references=true
spring.jackson.time-zone=Asia/Kolkata

spring.application.name=webutils-testapp
spring.profiles.active=dev
spring.web.resources.static-locations=file:./web/

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Liquibase runs from dbschema/ only: mvn liquibase:dropAll liquibase:update
spring.liquibase.enabled=false

server.port=8091

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

app.db.url=jdbc:mysql://localhost:3306/webutils-test
app.db.username=${DB_USERNAME:webutilstest}
app.db.password=${DB_PASSWORD:webutilstest}
app.db.driver=com.mysql.cj.jdbc.Driver
app.db.type=mysql

app.session.timeout.seconds=18000
app.session.renewal.seconds=600
app.login.uri=/login/login.html

app.webutils.userSpaceEnabled=true
app.classScanner.packagesToScan=com.webutils

# Skip email/SMS OTP delivery — codes are stored in FORM_TOKEN for local testing
app.devEnvironment=true

# Dummy email settings (delivery skipped in dev); required for EmailServerSettings bean
webutils.email.smtpHost=localhost
webutils.email.smtpLocalHost=localhost
webutils.email.smtpPort=25
webutils.email.userName=noreply@test.local
webutils.email.password=unused
webutils.email.enableTtls=false
webutils.email.useAuthentication=false
webutils.email.enableTlsV2=false
webutils.email.verification.template=

# Encryptor (override via JVM -Dapp.encryptor.* if needed)
app.encryptor.keystore=testapp-keystore
app.encryptor.alias=testapp
app.encryptor.password=testapp123

# Payment stubs (unused by widget demos; framework may read defaults)
webutils.payment.razorpay.keyId=rzp_test_local
webutils.payment.razorpay.keySecret=local_secret
webutils.payment.razorpay.webhookSecret=local_webhook_secret
webutils.payment.razorpay.currency=INR
