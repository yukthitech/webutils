<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login — WebUtils Testapp</title>
	<link href="/lib/bootstrap-5.1.0/css/bootstrap.min.css" rel="stylesheet">
	<link href="/lib/webutils/webutils.css" rel="stylesheet">
	<link href="/common/app.css" rel="stylesheet">
	<script src="/lib/jquery-3.6.0/jquery.min.js"></script>
	<script src="/lib/popper-2.9.3/popper.min.js"></script>
	<script src="/lib/bootstrap-5.1.0/js/bootstrap.min.js"></script>
	<script type="module" src="/common/app-config.js"></script>
</head>
<body>
	<div id="webutilsPageLoading" class="p-3">Loading…</div>
	<div id="ykApp" class="container" style="display:none;">
		<header class="testapp-header">
			<h1 id="testapp-login-title">WebUtils Testapp Login</h1>
			<p>Sign in to establish a session, then open the widget demos.</p>
		</header>

		<section class="testapp-panel" style="max-width: 28rem;">
			<div class="testapp-hint">
				Default user: <code>test@test.com</code> /
				password: <code>test</code> /
				space: <code>test</code>
			</div>

			<div class="mb-3">
				<label for="login-username" class="form-label">Username</label>
				<input id="login-username" class="form-control" type="text" v-model="username" autocomplete="username">
			</div>
			<div class="mb-3">
				<label for="login-password" class="form-label">Password</label>
				<input id="login-password" class="form-control" type="password" v-model="password" autocomplete="current-password">
			</div>
			<div class="mb-3">
				<label for="login-space" class="form-label">User space</label>
				<input id="login-space" class="form-control" type="text" v-model="userSpace">
			</div>

			<div id="login-error" class="webutils-error" v-if="error">{{ error }}</div>

			<button id="login-submit-btn" type="button" class="webutils-btn-primary"
				:disabled="busy" @click.prevent="login">
				{{ busy ? "Signing in…" : "Login" }}
			</button>
		</section>

		<yk-dialogs ref="ykDialogs"></yk-dialogs>
	</div>

	<script type="module" src="/login/login.js"></script>
</body>
</html>
